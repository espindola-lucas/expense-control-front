name: Frontend — Build & Push to DockerHub

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'package*.json'
      - 'vite.config.ts'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version tag
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v*" | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Resolved next tag: $NEXT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-control-frontend:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-control-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag and push version to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
